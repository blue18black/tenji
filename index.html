<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点字学習クイズ</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --dot-size: 30px;
    --cell-gap: 6px;
    --within-gap: 3px;
    --cell-pad: 4px;
    --dot-gap: 3px;
  }
  html, body { height: 100%; }
  html { scrollbar-gutter: stable; }
  body {
    margin: 0;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #eef2ff, #fdf4ff);
    font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    color: #1f2937;
    padding: 16px;
  }
  .app { width: 100%; max-width: 720px; }
  header { text-align: center; margin-bottom: 12px; }
  h1 { margin: 0 0 4px; font-size: 24px; color: #4338ca; }
  .subtitle { margin: 0; color: #6b7280; font-size: 13px; }
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    font-size: 14px;
    color: #4338ca;
  }
  .score-info { display: flex; gap: 16px; flex-wrap: wrap; }
  .link-btn {
    border: 1px solid #c7d2fe;
    background: #eef2ff;
    color: #4338ca;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 8px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  @media (hover: hover) and (pointer: fine) {
    .link-btn:hover { background: #e0e7ff; }
  }
  .quiz-card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(79, 70, 229, 0.12);
    padding: 22px 18px;
    text-align: center;
  }
  .word-display {
    font-size: clamp(24px, 7vw, 38px);
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    color: #111827;
    overflow-wrap: anywhere;
  }
  .word-display .active-char { color: #dc2626; }
  .cells-row, .answer-row {
    display: flex;
    flex-wrap: nowrap;
    justify-content: center;
    gap: var(--cell-gap);
    overflow: hidden;
  }
  .cells-row { margin-bottom: 14px; }
  .cell-group { display: flex; gap: var(--within-gap); flex-shrink: 0; }
  .braille-cell {
    display: grid;
    grid-template-columns: repeat(2, var(--dot-size));
    grid-template-rows: repeat(3, var(--dot-size));
    gap: var(--dot-gap);
    padding: var(--cell-pad);
    border-radius: 10px;
    background: #f3f4f6;
    flex-shrink: 0;
    transition: background .2s, box-shadow .2s;
  }
  .braille-cell.correct { background: #dcfce7; box-shadow: 0 0 0 2px #22c55e inset; }
  .braille-cell.wrong { background: #fee2e2; box-shadow: 0 0 0 2px #ef4444 inset; }
  .dot {
    width: var(--dot-size);
    height: var(--dot-size);
    border-radius: 50%;
    border: 2px solid #c7c9d1;
    background: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #9ca3af;
    padding: 0;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    outline: none;
  }
  .dot.on { background: #4338ca; border-color: #4338ca; color: transparent; }
  @media (hover: hover) and (pointer: fine) {
    .dot:hover { border-color: #818cf8; }
  }
  .braille-cell.locked-cell .dot { cursor: default; opacity: .85; }
  .answer-wrap { margin-top: 2px; }
  .answer-label { font-size: 12px; color: #6366f1; margin-bottom: 6px; font-weight: 600; }
  .answer-row .dot { cursor: default; }
  .answer-text { font-size: 22px; font-weight: 700; color: #111827; }
  .answer-input-wrap { margin: 4px 0 14px; }
  .text-input {
    font-size: 18px;
    padding: 9px 14px;
    border: 2px solid #c7c9d1;
    border-radius: 10px;
    width: 100%;
    max-width: 220px;
    text-align: center;
    font-family: inherit;
  }
  .text-input:focus { outline: none; border-color: #4338ca; }
  .text-input:disabled { background: #f3f4f6; opacity: .8; }
  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin: 14px 0 6px;
  }
  .btn {
    border: none;
    border-radius: 10px;
    padding: 9px 18px;
    font-size: 14px;
    cursor: pointer;
    background: #e5e7eb;
    color: #374151;
    transition: transform .1s, background .2s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary { background: #4338ca; color: #fff; }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  @media (hover: hover) and (pointer: fine) {
    .btn:hover { transform: translateY(-1px); }
    .btn-primary:hover { background: #3730a3; }
  }
  .feedback { min-height: 20px; font-size: 14px; font-weight: 600; margin-top: 6px; }
  .feedback.correct { color: #16a34a; }
  .feedback.wrong { color: #dc2626; }
  .hidden { display: none; }
  .home-card, .results-card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(79, 70, 229, 0.12);
    padding: 32px 24px;
    text-align: center;
  }
  .home-text { color: #4b5563; font-size: 14px; line-height: 1.7; margin: 0 0 22px; }
  .btn-large { padding: 13px 36px; font-size: 16px; }
  .mode-buttons { display: flex; flex-direction: column; gap: 10px; }
  .mode-buttons .btn-large { width: 100%; }
  .results-title { margin: 0 0 4px; font-size: 20px; color: #111827; }
  .results-score { font-size: 22px; font-weight: 700; color: #4338ca; margin: 4px 0 24px; }
  .results-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  @media (max-width: 480px) {
    body { padding: 10px; }
    .quiz-card { padding: 16px 12px; }
    .home-card, .results-card { padding: 24px 16px; }
  }
</style>
</head>
<body>
<div class="app">
  <header id="header">
    <h1>点字学習クイズ</h1>
    <p class="subtitle">点字を学んで身につけよう</p>
  </header>

  <section id="homeScreen" class="home-card">
    <p class="home-text">
      モードを選んでスタートしましょう。全10問です。
    </p>
    <div class="mode-buttons">
      <button class="btn btn-primary btn-large" data-mode="word">単語モード</button>
      <button class="btn btn-primary btn-large" data-mode="sentence">文章モード</button>
      <button class="btn btn-primary btn-large" data-mode="number">数字モード</button>
      <button class="btn btn-primary btn-large" data-mode="reading">点字を読むモード</button>
    </div>
  </section>

  <div id="quizScreen" class="hidden">
    <div class="score-bar">
      <button id="homeDuringGameBtn" class="link-btn">← ホームへ</button>
      <div class="score-info">
        <span>問題: <strong id="questionNum">1</strong> / 10</span>
        <span>正解: <strong id="correctCount">0</strong></span>
      </div>
    </div>

    <main class="quiz-card">
      <div class="word-display" id="wordDisplay"></div>

      <div class="cells-row" id="cellsRow"></div>

      <div id="answerInputWrap" class="answer-input-wrap hidden">
        <input type="text" id="answerInput" class="text-input" placeholder="ひらがなで入力" lang="ja" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </div>

      <div id="answerWrap"></div>

      <div class="controls">
        <button id="checkBtn" class="btn btn-primary">答え合わせ</button>
        <button id="clearBtn" class="btn">クリア</button>
        <button id="nextBtn" class="btn">次の問題 →</button>
      </div>

      <div class="feedback" id="feedback"></div>
    </main>
  </div>

  <section id="resultsScreen" class="results-card hidden">
    <h2 class="results-title">結果</h2>
    <p class="results-score" id="resultsScore">10問中 0問正解</p>
    <div class="results-buttons">
      <button id="retryBtn" class="btn btn-primary btn-large">もう一度</button>
      <button id="homeBtn" class="btn btn-large">ホームへ</button>
    </div>
  </section>
</div>

<script>
(function () {
  // 1,2,3 are the left column dots (top to bottom), 4,5,6 are the right column dots.
  var BASE = {
    "あ": [1], "い": [1,2], "う": [1,4], "え": [1,2,4], "お": [2,4],
    "か": [1,6], "き": [1,2,6], "く": [1,4,6], "け": [1,2,4,6], "こ": [2,4,6],
    "さ": [1,5,6], "し": [1,2,5,6], "す": [1,4,5,6], "せ": [1,2,4,5,6], "そ": [2,4,5,6],
    "た": [1,3,5], "ち": [1,2,3,5], "つ": [1,3,4,5], "て": [1,2,3,4,5], "と": [2,3,4,5],
    "な": [1,3], "に": [1,2,3], "ぬ": [1,3,4], "ね": [1,2,3,4], "の": [2,3,4],
    "は": [1,3,6], "ひ": [1,2,3,6], "ふ": [1,3,4,6], "へ": [1,2,3,4,6], "ほ": [2,3,4,6],
    "ま": [1,3,5,6], "み": [1,2,3,5,6], "む": [1,3,4,5,6], "め": [1,2,3,4,5,6], "も": [2,3,4,5,6],
    "や": [3,4], "ゆ": [3,4,6], "よ": [3,4,5],
    "ら": [1,5], "り": [1,2,5], "る": [1,4,5], "れ": [1,2,4,5], "ろ": [2,4,5],
    "わ": [3], "を": [3,5], "ん": [3,5,6]
  };
  var CHOON = [2,5];   // ー
  var SOKUON = [2];    // っ
  var DAKUTEN = [5];
  var HANDAKUTEN = [6];
  var YOUON = [4];
  var YOUDAKU = [4,5];
  var YOUHANDAKU = [4,6];

  function plain(ch) { return [BASE[ch]]; }
  function withMarker(marker, ch) { return [marker, BASE[ch]]; }

  var TOKENS = {};
  Object.keys(BASE).forEach(function (ch) { TOKENS[ch] = plain(ch); });
  TOKENS["ー"] = [CHOON];
  TOKENS["っ"] = [SOKUON];

  var DAKUTEN_MAP = {
    "が":"か","ぎ":"き","ぐ":"く","げ":"け","ご":"こ",
    "ざ":"さ","じ":"し","ず":"す","ぜ":"せ","ぞ":"そ",
    "だ":"た","ぢ":"ち","づ":"つ","で":"て","ど":"と",
    "ば":"は","び":"ひ","ぶ":"ふ","べ":"へ","ぼ":"ほ"
  };
  Object.keys(DAKUTEN_MAP).forEach(function (ch) {
    TOKENS[ch] = withMarker(DAKUTEN, DAKUTEN_MAP[ch]);
  });

  var HANDAKUTEN_MAP = { "ぱ":"は","ぴ":"ひ","ぷ":"ふ","ぺ":"へ","ぽ":"ほ" };
  Object.keys(HANDAKUTEN_MAP).forEach(function (ch) {
    TOKENS[ch] = withMarker(HANDAKUTEN, HANDAKUTEN_MAP[ch]);
  });

  var YOUON_ROWS = {
    "き": ["か","く","こ"], "し": ["さ","す","そ"], "ち": ["た","つ","と"],
    "に": ["な","ぬ","の"], "ひ": ["は","ふ","ほ"], "み": ["ま","む","も"], "り": ["ら","る","ろ"]
  };
  var SMALL_Y = ["ゃ","ゅ","ょ"];
  Object.keys(YOUON_ROWS).forEach(function (lead) {
    var rowBases = YOUON_ROWS[lead];
    SMALL_Y.forEach(function (smallY, i) {
      TOKENS[lead + smallY] = withMarker(YOUON, rowBases[i]);
    });
  });

  var YOUDAKU_ROWS = { "ぎ": ["か","く","こ"], "じ": ["さ","す","そ"], "ぢ": ["た","つ","と"], "び": ["は","ふ","ほ"] };
  Object.keys(YOUDAKU_ROWS).forEach(function (lead) {
    var rowBases = YOUDAKU_ROWS[lead];
    SMALL_Y.forEach(function (smallY, i) {
      TOKENS[lead + smallY] = withMarker(YOUDAKU, rowBases[i]);
    });
  });

  var YOUHANDAKU_ROWS = { "ぴ": ["は","ふ","ほ"] };
  Object.keys(YOUHANDAKU_ROWS).forEach(function (lead) {
    var rowBases = YOUHANDAKU_ROWS[lead];
    SMALL_Y.forEach(function (smallY, i) {
      TOKENS[lead + smallY] = withMarker(YOUHANDAKU, rowBases[i]);
    });
  });

  var WORDS = [
    "いぬ","ねこ","うさぎ","さかな","とり","ぞう","きりん","ぱんだ","らいおん","かえる",
    "つくえ","えんぴつ","ほん","かばん","がっこう","せんせい","としょかん","きょうしつ","でんしゃ","じてんしゃ",
    "ひこうき","くるま","しんぶん","たまご","りんご","ぶどう","みかん","すいか","たんじょうび","ともだち",
    "かぞく","げんき","ひゃく","しゃしん","きゃべつ","たんぽぽ","たいよう","つき","ほし","あめ",
    "ゆき","かみなり","たいふう","やったー","ありがとう"
  ];

  // Sentences use a space between words, just like real Japanese braille (which has no
  // kanji to mark word boundaries). A space maps to a single blank cell below.
  TOKENS[" "] = [[]];
  var SENTENCES = [
    "いぬが ねる", "そらが あおい", "はなが さく", "あめが ふる",
    "とりが うたう", "かぜが ふく", "ゆきが つもる", "ほしが ひかる",
    "とりが とぶ", "うちへ いく", "ほんを よむ", "えを かく",
    "うたを うたう", "みずを のむ", "もちを たべる", "やまに のぼる",
    "にわで はしる", "くるまに のる", "ねこが なく", "さかなが いる"
  ];

  // Digits reuse the dot patterns of braille letters a-j, preceded by a single
  // number sign (dots 3,4,5,6) that covers the whole run of digits.
  var NUMBER_SIGN = [3, 4, 5, 6];
  var DIGIT_DOTS = {
    "0": [2,4,5], "1": [1], "2": [1,2], "3": [1,4], "4": [1,4,5],
    "5": [1,5], "6": [1,2,4], "7": [1,2,4,5], "8": [1,2,5], "9": [2,4]
  };
  var NUMBERS = [
    "3", "7", "9", "12", "15", "28", "34", "50", "63", "79",
    "100", "123", "156", "200", "365", "480", "500", "999", "1000", "2024"
  ];

  // Each group is the set of braille cells for one input character: 1 cell for a
  // plain kana/digit, 2 cells for a dakuten/handakuten/youon-style combination.
  // The number sign has no digit of its own, so it's paired with the first digit
  // into one 2-frame group, just like a dakuten marker pairs with its base kana.
  function numberToGroups(numStr) {
    var digits = Array.from(numStr);
    var groups = [[NUMBER_SIGN, DIGIT_DOTS[digits[0]]]];
    for (var i = 1; i < digits.length; i++) {
      groups.push([DIGIT_DOTS[digits[i]]]);
    }
    return groups;
  }

  function tokenize(word) {
    var chars = Array.from(word);
    var tokens = [];
    var i = 0;
    while (i < chars.length) {
      var two = chars.slice(i, i + 2).join("");
      if (TOKENS[two]) { tokens.push(two); i += 2; continue; }
      var one = chars[i];
      if (TOKENS[one]) { tokens.push(one); i += 1; continue; }
      i += 1; // unknown character, skip
    }
    return tokens;
  }

  // Spaces between words (sentence mode) are skipped entirely - they're shown in the
  // word display for readability but never need to be struck in braille.
  function wordToGroups(word) {
    return tokenize(word).filter(function (t) { return t !== " "; }).map(function (t) { return TOKENS[t]; });
  }

  // Text shown in the word display, split so each piece lines up 1-to-1 with the
  // matching entry in correctGroups (used to highlight the character being input).
  function wordToDisplayTokens(word) {
    return tokenize(word);
  }
  function numberToDisplayTokens(numStr) {
    return Array.from(numStr);
  }

  var DOT_ORDER = [1, 4, 2, 5, 3, 6];
  var QUIZ_LENGTH = 10;

  var header = document.getElementById("header");
  var homeScreen = document.getElementById("homeScreen");
  var quizScreen = document.getElementById("quizScreen");
  var resultsScreen = document.getElementById("resultsScreen");
  var modeButtons = document.querySelectorAll("#homeScreen [data-mode]");
  var retryBtn = document.getElementById("retryBtn");
  var homeBtn = document.getElementById("homeBtn");
  var homeDuringGameBtn = document.getElementById("homeDuringGameBtn");
  var wordDisplay = document.getElementById("wordDisplay");
  var cellsRow = document.getElementById("cellsRow");
  var answerInputWrap = document.getElementById("answerInputWrap");
  var answerInput = document.getElementById("answerInput");
  var answerWrap = document.getElementById("answerWrap");
  var feedback = document.getElementById("feedback");
  var checkBtn = document.getElementById("checkBtn");
  var clearBtn = document.getElementById("clearBtn");
  var nextBtn = document.getElementById("nextBtn");
  var questionNumEl = document.getElementById("questionNum");
  var correctCountEl = document.getElementById("correctCount");
  var resultsScoreEl = document.getElementById("resultsScore");

  var correctGroups = [];
  var displayTokens = [];
  var userCells = [];
  var checked = false;
  var quizWords = [];
  var questionIndex = 0;
  var stats = { correct: 0 };
  var currentMode = "word";
  var currentWord = "";
  var activeGroupIndex = 0;
  var wordHasMistake = false;

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  // Recomputes --dot-size so that all braille cells always fit on a single row within
  // the quiz card, regardless of word length or screen width. Cells belonging to the
  // same character (group) sit closer together (--within-gap) than cells from
  // different characters (--cell-gap).
  function fitCellsToOneRow(totalCells, groupCount) {
    if (!totalCells) return;
    var rowGap = 6, withinGap = 3, cellPad = 4, dotGap = 3, minDot = 8;
    var maxDot = window.matchMedia("(pointer: coarse)").matches ? 34 : 30;
    var containerWidth = cellsRow.clientWidth || cellsRow.parentElement.clientWidth;
    var totalGaps = (groupCount - 1) * rowGap + (totalCells - groupCount) * withinGap;
    var available = containerWidth - totalGaps - totalCells * (dotGap + 2 * cellPad);
    var dot = Math.floor(available / (totalCells * 2));
    dot = Math.max(minDot, Math.min(maxDot, dot));
    var root = document.documentElement.style;
    root.setProperty("--dot-size", dot + "px");
    root.setProperty("--cell-gap", rowGap + "px");
    root.setProperty("--cell-pad", cellPad + "px");
    root.setProperty("--dot-gap", dotGap + "px");
    root.setProperty("--within-gap", withinGap + "px");
  }

  function buildCellElement(dotsOnSet, opts) {
    opts = opts || {};
    var cell = document.createElement("div");
    cell.className = "braille-cell";
    DOT_ORDER.forEach(function (dotNum) {
      var isOn = dotsOnSet.has(dotNum);
      if (opts.interactive) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "dot" + (isOn ? " on" : "");
        btn.textContent = dotNum;
        btn.setAttribute("aria-pressed", isOn ? "true" : "false");
        btn.setAttribute("aria-label", (opts.label || "") + dotNum + "の点");
        btn.addEventListener("click", opts.onToggle.bind(null, dotNum, btn));
        cell.appendChild(btn);
      } else {
        var d = document.createElement("div");
        d.className = "dot" + (isOn ? " on" : "");
        d.textContent = dotNum;
        cell.appendChild(d);
      }
    });
    return cell;
  }

  // Builds and appends the frames for just one character (1 cell for plain kana,
  // 2 cells for a dakuten/handakuten/youon-style combination) to the row.
  function appendGroupElement(gIdx) {
    var group = correctGroups[gIdx];
    var groupEl = document.createElement("div");
    groupEl.className = "cell-group";
    group.forEach(function (_, cIdx) {
      var cell = buildCellElement(new Set(), {
        interactive: true,
        label: (gIdx + 1) + "文字目" + (cIdx + 1) + "マス目 ",
        onToggle: function (dotNum, btn) {
          if (gIdx !== activeGroupIndex || checked) return;
          var set = userCells[gIdx][cIdx];
          if (set.has(dotNum)) {
            set.delete(dotNum);
            btn.classList.remove("on");
            btn.setAttribute("aria-pressed", "false");
          } else {
            set.add(dotNum);
            btn.classList.add("on");
            btn.setAttribute("aria-pressed", "true");
          }
        }
      });
      groupEl.appendChild(cell);
    });
    cellsRow.appendChild(groupEl);
    return groupEl;
  }

  // Cells belonging to the same character are wrapped in one .cell-group so the
  // number of frames shown always matches how many cells that character needs.
  // The input row only ever holds the current character; finished characters are
  // discarded once the player advances past them (see advanceToNextGroup).
  function renderCells(interactive) {
    cellsRow.innerHTML = "";
    if (!interactive) {
      correctGroups.forEach(function (group) {
        var groupEl = document.createElement("div");
        groupEl.className = "cell-group";
        group.forEach(function (dots) {
          groupEl.appendChild(buildCellElement(new Set(dots), { interactive: false }));
        });
        cellsRow.appendChild(groupEl);
      });
      return;
    }
    userCells = correctGroups.map(function (group) { return group.map(function () { return new Set(); }); });
    appendGroupElement(activeGroupIndex);
  }

  function setsEqual(arr, set) {
    if (arr.length !== set.size) return false;
    return arr.every(function (d) { return set.has(d); });
  }

  function showAnswerForGroup(gIdx) {
    answerWrap.innerHTML = "";
    var wrap = document.createElement("div");
    wrap.className = "answer-wrap";
    var label = document.createElement("div");
    label.className = "answer-label";
    label.textContent = "正しい点字";
    wrap.appendChild(label);
    var row = document.createElement("div");
    row.className = "answer-row";
    var groupEl = document.createElement("div");
    groupEl.className = "cell-group";
    correctGroups[gIdx].forEach(function (dots) {
      groupEl.appendChild(buildCellElement(new Set(dots), { interactive: false }));
    });
    row.appendChild(groupEl);
    wrap.appendChild(row);
    answerWrap.appendChild(wrap);
  }

  function showTextAnswer() {
    answerWrap.innerHTML = "";
    var wrap = document.createElement("div");
    wrap.className = "answer-wrap";
    var label = document.createElement("div");
    label.className = "answer-label";
    label.textContent = "正しい答え";
    var text = document.createElement("div");
    text.className = "answer-text";
    text.textContent = currentWord;
    wrap.appendChild(label);
    wrap.appendChild(text);
    answerWrap.appendChild(wrap);
  }

  function checkAnswer() {
    if (checked) return;
    checked = true;
    if (currentMode === "reading") {
      answerInput.disabled = true;
      var allCorrect = answerInput.value.trim() === currentWord;
      if (allCorrect) {
        stats.correct++;
        correctCountEl.textContent = stats.correct;
        feedback.textContent = "正解です!";
        feedback.className = "feedback correct";
      } else {
        feedback.textContent = "不正解…下に正しい答えを表示しています。";
        feedback.className = "feedback wrong";
        showTextAnswer();
      }
    } else {
      var groupEl = cellsRow.children[0];
      var cellEls = groupEl.querySelectorAll(".braille-cell");
      var group = correctGroups[activeGroupIndex];
      var groupOk = true;
      group.forEach(function (correctDots, cIdx) {
        var ok = setsEqual(correctDots, userCells[activeGroupIndex][cIdx]);
        cellEls[cIdx].classList.add(ok ? "correct" : "wrong", "locked-cell");
        if (!ok) groupOk = false;
      });
      if (groupOk) {
        feedback.textContent = (activeGroupIndex + 1) + "文字目: 正解!";
        feedback.className = "feedback correct";
      } else {
        feedback.textContent = (activeGroupIndex + 1) + "文字目: 不正解…下に正しい点字を表示しています。";
        feedback.className = "feedback wrong";
        showAnswerForGroup(activeGroupIndex);
      }
    }
    checkBtn.disabled = true;
  }

  function clearInput() {
    checked = false;
    checkBtn.disabled = false;
    feedback.textContent = "";
    feedback.className = "feedback";
    answerWrap.innerHTML = "";
    if (currentMode === "reading") {
      answerInput.disabled = false;
      answerInput.value = "";
      answerInput.focus();
      return;
    }
    var groupEl = cellsRow.children[0];
    groupEl.querySelectorAll(".braille-cell").forEach(function (cellEl, cIdx) {
      cellEl.classList.remove("correct", "wrong", "locked-cell");
      cellEl.querySelectorAll(".dot").forEach(function (d) {
        d.classList.remove("on");
        d.setAttribute("aria-pressed", "false");
      });
      userCells[activeGroupIndex][cIdx] = new Set();
    });
  }

  function totalCellCount() {
    return correctGroups.reduce(function (sum, g) { return sum + g.length; }, 0);
  }

  function updateNextBtnLabel() {
    if (currentMode !== "reading" && activeGroupIndex < correctGroups.length - 1) {
      nextBtn.textContent = "次の文字 →";
    } else if (questionIndex === QUIZ_LENGTH - 1) {
      nextBtn.textContent = "結果を見る";
    } else {
      nextBtn.textContent = "次の問題 →";
    }
  }

  // Highlights the piece of the displayed word/number that matches the character
  // currently being input. Spaces don't count toward the group index since they
  // aren't part of correctGroups (see wordToGroups).
  function renderWordDisplay() {
    wordDisplay.innerHTML = "";
    var groupCounter = 0;
    displayTokens.forEach(function (tok) {
      var span = document.createElement("span");
      span.textContent = tok;
      if (tok !== " ") {
        if (groupCounter === activeGroupIndex) span.classList.add("active-char");
        groupCounter++;
      }
      wordDisplay.appendChild(span);
    });
  }

  function loadQuestion() {
    var word = quizWords[questionIndex];
    currentWord = word;
    correctGroups = (currentMode === "number") ? numberToGroups(word) : wordToGroups(word);
    displayTokens = (currentMode === "number") ? numberToDisplayTokens(word) : wordToDisplayTokens(word);
    checked = false;
    activeGroupIndex = 0;
    wordHasMistake = false;
    feedback.textContent = "";
    feedback.className = "feedback";
    answerWrap.innerHTML = "";
    checkBtn.disabled = false;
    questionNumEl.textContent = questionIndex + 1;
    updateNextBtnLabel();

    if (currentMode === "reading") {
      wordDisplay.classList.add("hidden");
      answerInputWrap.classList.remove("hidden");
      answerInput.disabled = false;
      answerInput.value = "";
      fitCellsToOneRow(totalCellCount(), correctGroups.length);
      renderCells(false);
      window.setTimeout(function () { answerInput.focus(); }, 0);
    } else {
      wordDisplay.classList.remove("hidden");
      renderWordDisplay();
      answerInputWrap.classList.add("hidden");
      fitCellsToOneRow(totalCellCount(), correctGroups.length);
      renderCells(true);
    }
  }

  function showResults() {
    quizScreen.classList.add("hidden");
    header.classList.remove("hidden");
    resultsScoreEl.textContent = QUIZ_LENGTH + "問中 " + stats.correct + "問正解";
    resultsScreen.classList.remove("hidden");
  }

  function goToNextQuestion() {
    questionIndex++;
    if (questionIndex >= QUIZ_LENGTH) {
      showResults();
    } else {
      loadQuestion();
    }
  }

  function advanceToNextGroup() {
    // The just-finished character's frames are discarded (not kept on screen) so the
    // input row always shows only the character currently being entered.
    if (cellsRow.querySelector(".braille-cell.wrong")) wordHasMistake = true;
    activeGroupIndex++;
    checked = false;
    feedback.textContent = "";
    feedback.className = "feedback";
    answerWrap.innerHTML = "";
    checkBtn.disabled = false;
    cellsRow.innerHTML = "";
    var groupEl = appendGroupElement(activeGroupIndex);
    groupEl.querySelector(".dot").focus();
    updateNextBtnLabel();
    renderWordDisplay();
  }

  function handleAdvanceOrCheck() {
    if (!checked) {
      if (!checkBtn.disabled) checkAnswer();
      return;
    }
    if (currentMode !== "reading" && activeGroupIndex < correctGroups.length - 1) {
      advanceToNextGroup();
      return;
    }
    if (currentMode !== "reading") {
      var anyWrong = wordHasMistake || cellsRow.querySelector(".braille-cell.wrong") !== null;
      if (!anyWrong) {
        stats.correct++;
        correctCountEl.textContent = stats.correct;
      }
    }
    goToNextQuestion();
  }

  checkBtn.addEventListener("click", checkAnswer);
  clearBtn.addEventListener("click", clearInput);
  nextBtn.addEventListener("click", handleAdvanceOrCheck);

  function goHome() {
    quizScreen.classList.add("hidden");
    resultsScreen.classList.add("hidden");
    header.classList.remove("hidden");
    homeScreen.classList.remove("hidden");
  }

  function startQuiz(mode) {
    currentMode = mode;
    var pool = mode === "sentence" ? SENTENCES : (mode === "number" ? NUMBERS : WORDS);
    quizWords = shuffle(pool).slice(0, QUIZ_LENGTH);
    questionIndex = 0;
    stats = { correct: 0 };
    correctCountEl.textContent = 0;
    homeScreen.classList.add("hidden");
    resultsScreen.classList.add("hidden");
    header.classList.add("hidden");
    quizScreen.classList.remove("hidden");
    loadQuestion();
  }

  modeButtons.forEach(function (btn) {
    btn.addEventListener("click", function () { startQuiz(btn.dataset.mode); });
  });

  retryBtn.addEventListener("click", function () { startQuiz(currentMode); });
  homeBtn.addEventListener("click", goHome);
  homeDuringGameBtn.addEventListener("click", goHome);

  window.addEventListener("resize", function () {
    if (!quizScreen.classList.contains("hidden") && correctGroups.length) {
      fitCellsToOneRow(totalCellCount(), correctGroups.length);
    }
  });

  document.addEventListener("keydown", function (e) {
    if (e.key !== "Enter") return;
    if (quizScreen.classList.contains("hidden")) return;
    var activeEl = document.activeElement;
    if (activeEl === checkBtn || activeEl === clearBtn || activeEl === nextBtn || activeEl === homeDuringGameBtn) return;
    e.preventDefault();
    handleAdvanceOrCheck();
  });
})();
</script>
</body>
</html>
